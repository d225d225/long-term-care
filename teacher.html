<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>教師管理後台 — 青銀共融心得</title>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:"Noto Sans TC","Microsoft JhengHei",sans-serif;background:#f0f4f8;color:#333;min-height:100vh}

    /* ── 登入 ── */
    #login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#2c3e50,#3d5a73)}
    .login-box{background:#fff;border-radius:20px;padding:2.5rem 2rem;width:340px;box-shadow:0 8px 32px rgba(0,0,0,.25);text-align:center}
    .login-box h1{font-size:1.3rem;margin-bottom:.4rem;color:#2c3e50}
    .login-box p{font-size:.85rem;color:#888;margin-bottom:1.5rem}
    .login-box input{width:100%;padding:.7rem 1rem;border:1.5px solid #ddd;border-radius:10px;font-size:1rem;outline:none;text-align:center;letter-spacing:.2em;margin-bottom:1rem;transition:border-color .2s}
    .login-box input:focus{border-color:#3d5a73}
    .login-btn{width:100%;padding:.75rem;background:linear-gradient(135deg,#3d5a73,#2c3e50);color:#fff;border:none;border-radius:10px;font-size:1rem;font-weight:600;cursor:pointer;transition:opacity .2s}
    .login-btn:hover{opacity:.88}
    .login-error{color:#e74c3c;font-size:.85rem;margin-top:.5rem;min-height:1.2em}

    /* ── 主介面 ── */
    #app{display:none}
    header{background:linear-gradient(135deg,#2c3e50,#3d5a73);color:#fff;padding:1.2rem 1.5rem;display:flex;justify-content:space-between;align-items:center}
    header h1{font-size:1.2rem;font-weight:700}
    header .sub{font-size:.8rem;opacity:.8;margin-top:.2rem}
    .logout-btn{background:rgba(255,255,255,.15);border:none;color:#fff;padding:.4rem .9rem;border-radius:8px;cursor:pointer;font-size:.85rem}
    .logout-btn:hover{background:rgba(255,255,255,.25)}

    .stats-bar{background:#fff;border-bottom:1px solid #e8ecf0;padding:.8rem 1.5rem;display:flex;gap:1.5rem;flex-wrap:wrap}
    .stat{text-align:center}
    .stat-num{font-size:1.4rem;font-weight:700;color:#2c3e50}
    .stat-label{font-size:.72rem;color:#888}
    .stat.green .stat-num{color:#27ae60}
    .stat.orange .stat-num{color:#e07b4f}

    .toolbar{background:#fff;border-bottom:1px solid #e8ecf0;padding:.8rem 1.5rem;display:flex;gap:.6rem;flex-wrap:wrap;align-items:center}
    .filter-btn{padding:.35rem .9rem;border-radius:20px;border:1.5px solid #ddd;background:#fff;font-size:.82rem;cursor:pointer;transition:all .2s}
    .filter-btn.active{background:#3d5a73;border-color:#3d5a73;color:#fff}
    .filter-btn:hover:not(.active){background:#f0f4f8}
    .sep{width:1px;height:24px;background:#e0e0e0;margin:0 .2rem}
    .search-input{padding:.35rem .8rem;border:1.5px solid #ddd;border-radius:20px;font-size:.82rem;outline:none;width:180px;transition:border-color .2s}
    .search-input:focus{border-color:#3d5a73}

    main{max-width:860px;margin:0 auto;padding:1.2rem 1rem 4rem}
    #list{display:grid;gap:1rem}

    /* ── 卡片 ── */
    .post-card{background:#fff;border-radius:14px;box-shadow:0 2px 8px rgba(0,0,0,.07);overflow:hidden;transition:box-shadow .2s}
    .post-card:hover{box-shadow:0 4px 16px rgba(0,0,0,.12)}
    .post-card.commented{border-left:4px solid #27ae60}
    .post-card.not-commented{border-left:4px solid #e0e0e0}

    .post-header{padding:1rem 1.2rem .7rem;display:flex;justify-content:space-between;align-items:flex-start;gap:.8rem;cursor:pointer}
    .post-name{font-weight:700;font-size:.95rem}
    .post-meta{font-size:.78rem;color:#888;margin-top:.2rem}
    .post-email{font-size:.78rem;color:#5a8fc0;margin-top:.1rem}
    .post-right{display:flex;flex-direction:column;align-items:flex-end;gap:.4rem;flex-shrink:0}

    .group-tag{font-size:.72rem;padding:.15rem .6rem;border-radius:12px;font-weight:600;white-space:nowrap}
    .tag-env{background:#d4edda;color:#285a30}
    .tag-chat{background:#d0e8f7;color:#1a4f72}
    .status-tag{font-size:.7rem;padding:.12rem .55rem;border-radius:10px;font-weight:600}
    .status-done{background:#d4edda;color:#285a30}
    .status-pending{background:#fff3cd;color:#856404}

    .post-body{padding:.8rem 1.2rem;font-size:.9rem;line-height:1.7;color:#444;white-space:pre-wrap;border-top:1px solid #f0f0f0;display:none}
    .post-body.open{display:block}

    /* ── 已有評語 (紅色) ── */
    .existing-comment{margin:.8rem 0 0;padding:.9rem 1rem;background:#fff5f5;border-left:3px solid #e74c3c;border-radius:0 8px 8px 0}
    .existing-comment strong{color:#c0392b;display:block;margin-bottom:.4rem;font-size:.78rem;font-weight:700}
    .existing-comment .comment-text{color:#c0392b;font-size:.88rem;line-height:1.7;font-weight:500}

    /* ── 盧盧印章 ── */
    .stamp-wrap{display:flex;align-items:center;gap:.5rem;margin-top:.8rem}
    .lulu-stamp{
      display:inline-flex;flex-direction:column;align-items:center;justify-content:center;
      width:68px;height:68px;flex-shrink:0;
      border:3px solid rgba(192,57,43,.72);
      border-radius:50%;
      transform:rotate(-18deg);
      animation:stampDrop .45s cubic-bezier(.36,.07,.19,.97) both;
      background:radial-gradient(circle,rgba(255,240,240,.6) 0%,transparent 70%);
      box-shadow:inset 0 0 10px rgba(192,57,43,.1), 0 0 0 1px rgba(192,57,43,.15);
      position:relative;
    }
    .lulu-stamp::before{
      content:'';position:absolute;inset:4px;border:1.5px dashed rgba(192,57,43,.3);border-radius:50%;
    }
    .stamp-kanji{font-size:1.1rem;font-weight:900;color:rgba(192,57,43,.82);letter-spacing:2px;line-height:1}
    .stamp-sub{font-size:.48rem;color:rgba(192,57,43,.7);letter-spacing:1.5px;margin-top:2px;font-weight:700}
    @keyframes stampDrop{
      0%{transform:rotate(-18deg) scale(3);opacity:0}
      55%{transform:rotate(-18deg) scale(.88);opacity:.9}
      75%{transform:rotate(-18deg) scale(1.06)}
      100%{transform:rotate(-18deg) scale(1);opacity:1}
    }
    .stamp-caption{font-size:.75rem;color:#aaa}

    /* ── 評語表單 ── */
    .comment-form{padding:.8rem 1.2rem 1.2rem;border-top:1px solid #f0f0f0;display:none}
    .comment-form.open{display:block}
    .comment-form label{font-size:.82rem;color:#666;display:block;margin-bottom:.4rem;font-weight:600}
    .comment-form textarea{width:100%;padding:.6rem .8rem;border:1.5px solid #ddd;border-radius:8px;font-size:.88rem;resize:vertical;min-height:90px;outline:none;font-family:inherit;transition:border-color .2s}
    .comment-form textarea:focus{border-color:#c0392b}

    .form-actions{display:flex;gap:.6rem;margin-top:.7rem;flex-wrap:wrap;align-items:center}
    .btn{padding:.5rem 1.1rem;border-radius:8px;border:none;font-size:.85rem;font-weight:600;cursor:pointer;transition:all .2s}
    .btn-primary{background:#3d5a73;color:#fff}
    .btn-primary:hover{background:#2c3e50}
    .btn-email{background:#27ae60;color:#fff}
    .btn-email:hover{background:#1e8449}
    .btn-email:disabled{opacity:.5;cursor:not-allowed}

    .email-status{font-size:.78rem;margin-top:.5rem;min-height:1em}
    .email-status.ok{color:#27ae60}
    .email-status.err{color:#e74c3c}
    .email-status.sending{color:#888}

    .expand-arrow{font-size:.8rem;color:#aaa;transition:transform .2s;display:inline-block}
    .expand-arrow.open{transform:rotate(180deg)}

    .empty-state{text-align:center;padding:3rem;color:#bbb;font-size:.95rem}
    .empty-state span{font-size:2.5rem;display:block;margin-bottom:.6rem}

    .setup-banner{background:#fff3cd;border:1.5px solid #ffc107;border-radius:10px;padding:.9rem 1.1rem;margin-bottom:1rem;font-size:.83rem;line-height:1.7}
    .setup-banner code{background:#f8f1d8;padding:.1rem .3rem;border-radius:4px}
    .setup-banner.hidden{display:none}

    .toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%) translateY(60px);background:#2c3e50;color:#fff;padding:.7rem 1.4rem;border-radius:24px;font-size:.9rem;opacity:0;transition:all .35s ease;z-index:99;pointer-events:none;white-space:nowrap}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  </style>
</head>
<body>

<div id="login-screen">
  <div class="login-box">
    <h1>👩‍🏫 教師管理後台</h1>
    <p>青銀共融「一日照服小幫手」心得評語系統</p>
    <input type="password" id="pwd-input" placeholder="請輸入教師密碼"
      onkeydown="if(event.key==='Enter')doLogin()" />
    <button class="login-btn" onclick="doLogin()">登入</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<div id="app">
  <header>
    <div>
      <h1>📋 心得評語管理</h1>
      <div class="sub">115年度青銀共融活動 — 永平高中</div>
    </div>
    <button class="logout-btn" onclick="doLogout()">登出</button>
  </header>

  <div class="stats-bar">
    <div class="stat"><div class="stat-num" id="s-total">0</div><div class="stat-label">總心得數</div></div>
    <div class="stat green"><div class="stat-num" id="s-commented">0</div><div class="stat-label">已評語</div></div>
    <div class="stat orange"><div class="stat-num" id="s-pending">0</div><div class="stat-label">待評語</div></div>
    <div class="stat"><div class="stat-num" id="s-env">0</div><div class="stat-label">環境組</div></div>
    <div class="stat"><div class="stat-num" id="s-chat">0</div><div class="stat-label">聊天組</div></div>
  </div>

  <div class="toolbar">
    <button class="filter-btn active" data-sg="status" onclick="setFilter('all',this)">全部</button>
    <button class="filter-btn" data-sg="status" onclick="setFilter('pending',this)">待評語</button>
    <button class="filter-btn" data-sg="status" onclick="setFilter('commented',this)">已評語</button>
    <div class="sep"></div>
    <button class="filter-btn active" data-sg="group" onclick="setGroup('all',this)">所有組別</button>
    <button class="filter-btn" data-sg="group" onclick="setGroup('env',this)">環境組</button>
    <button class="filter-btn" data-sg="group" onclick="setGroup('chat',this)">聊天組</button>
    <div class="sep"></div>
    <input class="search-input" type="text" placeholder="🔍 搜尋姓名 / 內容" oninput="setSearch(this.value)" />
  </div>

  <main>
    <div class="setup-banner" id="setup-banner">
      ⚠️ <strong>尚未連接 Firebase</strong>，目前顯示本機測試資料。請填入 Firebase 與 EmailJS 設定後重新部署。
    </div>
    <div id="list"><div class="empty-state"><span>⏳</span>載入中…</div></div>
  </main>
</div>

<div class="toast" id="toast"></div>

<script>
/* ============================================================
   CONFIG
   ============================================================ */
const FIREBASE_CONFIG = {
  apiKey:            "",
  authDomain:        "",
  projectId:         "",
  storageBucket:     "",
  messagingSenderId: "",
  appId:             ""
};
const EMAILJS_PUBLIC_KEY  = "";
const EMAILJS_SERVICE_ID  = "";
const EMAILJS_TEMPLATE_ID = "";
const TEACHER_PASSWORD    = "teacher2025";
/* ============================================================ */

const IS_FB  = FIREBASE_CONFIG.apiKey !== "";
const IS_EJS = EMAILJS_PUBLIC_KEY !== "";
let db = null, allPosts = [];
let filterStatus = 'all', filterGroup = 'all', searchText = '';

// ── 登入 ──
function doLogin() {
  if (document.getElementById('pwd-input').value === TEACHER_PASSWORD) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    init();
  } else {
    document.getElementById('login-error').textContent = '密碼錯誤，請再試一次';
    document.getElementById('pwd-input').value = '';
  }
}
function doLogout() {
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
  document.getElementById('pwd-input').value = '';
}

// ── 初始化 ──
function init() {
  if (IS_FB) {
    if (!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG);
    db = firebase.firestore();
    document.getElementById('setup-banner').classList.add('hidden');
    db.collection('posts').orderBy('timestamp','desc').onSnapshot(snap => {
      allPosts = snap.docs.map(d => ({
        id: d.id, ...d.data(),
        time: d.data().timestamp?.toDate?.()?.toLocaleString('zh-TW',{hour12:false}) || '—'
      }));
      render();
    });
  } else {
    allPosts = JSON.parse(localStorage.getItem('yp_ltc_posts_v1') || '[]');
    render();
  }
  if (IS_EJS) emailjs.init(EMAILJS_PUBLIC_KEY);
}

// ── 篩選 ──
function setFilter(v, btn) {
  filterStatus = v;
  document.querySelectorAll('[data-sg="status"]').forEach(b => b.classList.remove('active'));
  btn.classList.add('active'); render();
}
function setGroup(v, btn) {
  filterGroup = v;
  document.querySelectorAll('[data-sg="group"]').forEach(b => b.classList.remove('active'));
  btn.classList.add('active'); render();
}
function setSearch(v) { searchText = v.toLowerCase(); render(); }

// ── 渲染 ──
function render() {
  let posts = [...allPosts];
  document.getElementById('s-total').textContent     = posts.length;
  document.getElementById('s-commented').textContent = posts.filter(p=>p.teacherComment).length;
  document.getElementById('s-pending').textContent   = posts.filter(p=>!p.teacherComment).length;
  document.getElementById('s-env').textContent       = posts.filter(p=>p.group==='env').length;
  document.getElementById('s-chat').textContent      = posts.filter(p=>p.group==='chat').length;

  if (filterStatus === 'pending')   posts = posts.filter(p => !p.teacherComment);
  if (filterStatus === 'commented') posts = posts.filter(p =>  p.teacherComment);
  if (filterGroup  !== 'all')       posts = posts.filter(p => p.group === filterGroup);
  if (searchText)                   posts = posts.filter(p =>
    (p.name||'').toLowerCase().includes(searchText) ||
    (p.text||'').toLowerCase().includes(searchText) ||
    (p.cls ||'').toLowerCase().includes(searchText));

  const list = document.getElementById('list');
  if (posts.length === 0) {
    list.innerHTML = `<div class="empty-state"><span>📭</span>沒有符合條件的心得</div>`;
    return;
  }

  list.innerHTML = posts.map(p => `
    <div class="post-card ${p.teacherComment?'commented':'not-commented'}" id="card-${p.id}">

      <div class="post-header" onclick="toggleCard('${p.id}')">
        <div>
          <div class="post-name">${esc(p.name)}${p.cls?' ‧ '+esc(p.cls):''}</div>
          <div class="post-meta">🕐 ${esc(p.time||'')}</div>
          ${p.email?`<div class="post-email">📧 ${esc(p.email)}</div>`:''}
        </div>
        <div class="post-right">
          <span class="group-tag ${p.group==='env'?'tag-env':'tag-chat'}">
            ${p.group==='env'?'🌿 環境組':'💬 聊天組'}
          </span>
          <span class="status-tag ${p.teacherComment?'status-done':'status-pending'}">
            ${p.teacherComment?'✅ 已評語':'⏳ 待評語'}
          </span>
          <span class="expand-arrow" id="arrow-${p.id}">▼</span>
        </div>
      </div>

      <div class="post-body" id="body-${p.id}">
        ${esc(p.text)}
        ${p.teacherComment ? `
          <div class="existing-comment">
            <strong>👩‍🏫 老師評語${p.commentedAt?' （'+esc(p.commentedAt)+'）':''}</strong>
            <div class="comment-text">${esc(p.teacherComment)}</div>
          </div>
          <div class="stamp-wrap">
            <div class="lulu-stamp" id="stamp-${p.id}">
              <div class="stamp-kanji">盧盧</div>
              <div class="stamp-sub">已閱讀</div>
            </div>
            <span class="stamp-caption">老師已閱讀並給予評語</span>
          </div>` : ''}
      </div>

      <div class="comment-form" id="form-${p.id}">
        <label>👩‍🏫 ${p.teacherComment?'修改評語':'填寫評語'}</label>
        <textarea id="cmt-${p.id}" placeholder="請輸入對這位同學的評語與鼓勵…">${esc(p.teacherComment||'')}</textarea>
        <div class="form-actions">
          <button class="btn btn-primary" onclick="saveComment('${p.id}')">💾 儲存評語</button>
          ${p.email && IS_EJS ? `
            <button class="btn btn-email" id="ebtn-${p.id}" onclick="sendEmail('${p.id}')">
              📧 寄送通知信
            </button>` : (p.email && !IS_EJS ? `<span style="font-size:.78rem;color:#aaa">設定 EmailJS 後可發信</span>` : '')}
        </div>
        <div class="email-status" id="estatus-${p.id}"></div>
      </div>

    </div>
  `).join('');
}

function toggleCard(id) {
  ['body-','form-'].forEach(pre => {
    document.getElementById(pre+id)?.classList.toggle('open');
  });
  document.getElementById('arrow-'+id)?.classList.toggle('open');
}

// ── 儲存評語 ──
async function saveComment(id) {
  const cmt = document.getElementById('cmt-'+id)?.value.trim();
  if (!cmt) { showToast('請填寫評語內容'); return; }
  const now = new Date().toLocaleString('zh-TW',{hour12:false});
  try {
    if (IS_FB) {
      await db.collection('posts').doc(id).update({ teacherComment: cmt, commentedAt: now });
    } else {
      const posts = JSON.parse(localStorage.getItem('yp_ltc_posts_v1')||'[]');
      const i = posts.findIndex(p=>String(p.id)===String(id));
      if (i>-1) { posts[i].teacherComment=cmt; posts[i].commentedAt=now; }
      localStorage.setItem('yp_ltc_posts_v1', JSON.stringify(posts));
      allPosts = posts; render();
    }
    showToast('評語已儲存 ✅');
  } catch(e) { showToast('儲存失敗'); console.error(e); }
}

// ── 發送 Email（包含學生原始心得）──
async function sendEmail(id) {
  const post = allPosts.find(p => p.id === id);
  if (!post) return;
  const cmt = document.getElementById('cmt-'+id)?.value.trim();
  if (!cmt) { showToast('請先填寫並儲存評語再發信'); return; }

  const btn = document.getElementById('ebtn-'+id);
  const sta = document.getElementById('estatus-'+id);
  if (btn) btn.disabled = true;
  sta.className = 'email-status sending'; sta.textContent = '發送中…';

  try {
    await emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, {
      student_name:    post.name  || '',
      student_email:   post.email || '',
      student_class:   post.cls   || '',
      student_group:   post.group === 'env' ? '環境組' : '聊天組',
      student_text:    post.text  || '',   // ← 學生原始心得
      teacher_comment: cmt,
      activity_name:   '115年度青銀共融「一日照服小幫手」體驗活動'
    });
    sta.className = 'email-status ok'; sta.textContent = '✅ 通知信已成功寄出！';
    showToast('📧 Email 已寄出');
    if (IS_FB) await db.collection('posts').doc(id).update({ emailSent: true });
  } catch(e) {
    sta.className = 'email-status err';
    sta.textContent = '❌ 發送失敗：' + (e?.text || e?.message || '請確認 EmailJS 設定');
    console.error(e);
  }
  if (btn) btn.disabled = false;
}

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') }
function showToast(msg){
  const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2800);
}
</script>
</body>
</html>
