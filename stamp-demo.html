<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <style>
    body { font-family: "Noto Sans TC", "Microsoft JhengHei", sans-serif;
           background: #f5f0eb; display: flex; align-items: center;
           justify-content: center; min-height: 100vh; margin: 0; }

    .demo { background: white; border-radius: 16px; padding: 2rem 2.5rem;
            box-shadow: 0 4px 20px rgba(0,0,0,.1); max-width: 420px; width: 90%; }

    h3 { color: #2c3e50; margin-bottom: 1rem; font-size: 1rem; }

    /* 評語區（紅色） */
    .teacher-comment { padding: .9rem 1rem; background: #fff5f5;
                       border-left: 3px solid #e74c3c; border-radius: 0 8px 8px 0;
                       margin-bottom: 1rem; }
    .teacher-comment strong { color: #c0392b; display: block;
                               margin-bottom: .4rem; font-size: .78rem; font-weight: 700; }
    .teacher-comment .cmt-text { color: #c0392b; font-size: .9rem;
                                  line-height: 1.7; font-weight: 500; }

    /* 印章區 */
    .stamp-wrap { display: flex; align-items: center; gap: .8rem; margin-top: .5rem; }

    .lulu-stamp {
      display: inline-flex; flex-direction: column;
      align-items: center; justify-content: center;
      width: 72px; height: 72px; flex-shrink: 0;
      border: 3px solid rgba(192,57,43,.75);
      border-radius: 50%;
      transform: rotate(-18deg);
      background: radial-gradient(circle, rgba(255,235,235,.7) 0%, transparent 70%);
      box-shadow: inset 0 0 10px rgba(192,57,43,.12), 0 0 0 1px rgba(192,57,43,.18);
      position: relative;
      animation: stampDrop .5s cubic-bezier(.36,.07,.19,.97) both;
    }
    .lulu-stamp::before {
      content: ''; position: absolute; inset: 4px;
      border: 1.5px dashed rgba(192,57,43,.32); border-radius: 50%;
    }
    .stamp-kanji { font-size: 1.15rem; font-weight: 900;
                   color: rgba(192,57,43,.85); letter-spacing: 2px; line-height: 1; }
    .stamp-sub   { font-size: .5rem; color: rgba(192,57,43,.72);
                   letter-spacing: 1.5px; margin-top: 3px; font-weight: 700; }

    @keyframes stampDrop {
      0%   { transform: rotate(-18deg) scale(3); opacity: 0; }
      55%  { transform: rotate(-18deg) scale(.87); opacity: .9; }
      75%  { transform: rotate(-18deg) scale(1.07); }
      100% { transform: rotate(-18deg) scale(1); opacity: 1; }
    }

    .stamp-caption { font-size: .8rem; color: #aaa; line-height: 1.5; }
  </style>
</head>
<body>
  <div class="demo">
    <h3>👩‍🏫 老師評語</h3>

    <div class="teacher-comment">
      <strong>老師評語（2026/05/19 16:30）</strong>
      <div class="cmt-text">很棒的心得！你展現了很好的同理心，能夠主動與長輩互動，值得鼓勵！繼續保持這份熱忱。</div>
    </div>

    <div class="stamp-wrap">
      <div class="lulu-stamp">
        <div class="stamp-kanji">盧盧</div>
        <div class="stamp-sub">已閱讀</div>
      </div>
      <span class="stamp-caption">老師已閱讀<br>並給予評語</span>
    </div>
  </div>
</body>
</html>
